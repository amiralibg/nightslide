<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NIGHTSLIDE">
  <defs>
    <linearGradient id="ns-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141b22"/>
      <stop offset="1" stop-color="#05070a"/>
    </linearGradient>
    <filter id="ns-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#ns-bg)"/>
  <!-- amber drift skid marks -->
  <g stroke="#ffa033" fill="none" stroke-linecap="round">
    <path d="M12 54 Q 20 30 44 22" stroke-width="3.6" opacity="0.35" filter="url(#ns-glow)"/>
    <path d="M12 54 Q 20 30 44 22" stroke-width="2.6" opacity="0.95"/>
    <path d="M18 56 Q 26 34 49 26" stroke-width="2.6" opacity="0.9"/>
  </g>
  <!-- drifting car (top-down) -->
  <g transform="translate(45 23) rotate(-32)">
    <rect x="-9" y="-6" width="18" height="12" rx="3.5" fill="#e8503a"/>
    <rect x="-9" y="-6" width="18" height="3.4" rx="1.6" fill="#ffffff" opacity="0.18"/>
    <rect x="-3" y="-4.2" width="8" height="8.4" rx="2" fill="#0b0f14" opacity="0.85"/>
  </g>
</svg>
